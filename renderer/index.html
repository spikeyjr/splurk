<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Splurk</title>
  <link rel="stylesheet" href="css/themes/dark.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <div id="vault-selector" class="vault-selector">
    <div class="vs-inner">
      <div class="vs-logo">splurk</div>
      <p class="vs-tagline">your second brain, locally owned</p>
      <button id="btn-pick-vault" class="btn-primary">open existing vault</button>
      <button id="btn-new-vault" class="btn-secondary">create new vault</button>
      <p class="vs-hint">pick any folder with <code>.md</code> files</p>
    </div>
  </div>

  <div id="app" class="app" style="display:none">

    <div class="titlebar">
      <div class="titlebar-drag"></div>
      <div class="titlebar-name">splurk</div>
      <div class="titlebar-controls">
        <button class="tb-btn" id="btn-graph-view" title="Graph view (Ctrl+G)">⬡</button>
        <button class="tb-btn" id="btn-canvas-view" title="Canvas (Ctrl+Shift+C)">⬚</button>
        <button class="tb-btn" id="btn-minimize">─</button>
        <button class="tb-btn" id="btn-close">✕</button>
      </div>
    </div>

    <div class="body">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="vault-name" id="vault-name">vault</span>
          <button class="icon-btn" id="btn-new-file" title="New note">+</button>
        </div>
        <div class="file-tree" id="file-tree"></div>
      </aside>

      <div class="main-area">
        <div class="tab-bar" id="tab-bar">
          <div class="tab-list" id="tab-list"></div>
          <div class="tab-actions">
            <button id="btn-toggle-mode">edit</button>
          </div>
        </div>
        <div class="editor-wrap" id="editor-wrap">
          <div class="editor-empty" id="editor-empty"><span>select a note to open it · Ctrl+P to search</span></div>
          <div id="codemirror-host" style="display:none;height:100%;overflow:auto"></div>
          <div id="preview-host" style="display:none;height:100%;overflow:auto;padding:32px 48px"></div>
        </div>
      </div>
    </div>

    <!-- Graph overlay -->
    <div id="graph-overlay" class="graph-overlay" style="display:none;flex-direction:column">
      <div class="graph-overlay-header">
        <div style="display:flex;align-items:center;gap:10px">
          <span>knowledge graph</span>
          <input id="graph-search" type="text" placeholder="search nodes…"
            style="background:var(--bg-elevated);border:1px solid var(--border-normal);
                   border-radius:var(--r-sm);padding:4px 10px;color:var(--text-primary);
                   font-family:var(--font-mono);font-size:11px;outline:none;width:160px">
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <button class="canvas-tool-btn" id="graph-zoom-in"  title="Zoom in">+</button>
          <button class="canvas-tool-btn" id="graph-zoom-out" title="Zoom out">−</button>
          <button class="canvas-tool-btn" id="graph-fit"      title="Fit to screen">⊡</button>
          <button class="icon-btn" id="btn-close-graph">✕</button>
        </div>
      </div>
      <div id="graph-canvas" style="width:100%;flex:1;position:relative"></div>
    </div>

    <!-- Canvas overlay -->
    <div id="canvas-overlay" class="graph-overlay" style="display:none;flex-direction:column">
      <div class="graph-overlay-header">
        <span>canvas</span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="canvas-tool-btn active" id="tool-select" title="Select (V)">↖</button>
          <button class="canvas-tool-btn" id="tool-card"    title="Add text card (T)">T</button>
          <button class="canvas-tool-btn" id="tool-note"    title="Add note card (N)">◆</button>
          <button class="canvas-tool-btn" id="tool-connect" title="Connect (C)">⤤</button>
          <div style="width:1px;height:20px;background:var(--border-subtle);margin:0 4px"></div>
          <button class="canvas-tool-btn" id="tool-fit"   title="Fit to screen">⊡</button>
          <button class="canvas-tool-btn" id="tool-clear" title="Clear canvas" style="color:var(--red)">⊘</button>
          <button class="icon-btn" id="btn-close-canvas">✕</button>
        </div>
      </div>
      <div id="canvas-area" style="flex:1;position:relative;overflow:hidden;cursor:default">
        <canvas id="splurk-canvas"></canvas>
        <div id="canvas-nodes"></div>
      </div>
    </div>

    <div class="statusbar">
      <span id="status-file">—</span>
      <span class="statusbar-sep"></span>
      <span id="status-mode">edit</span>
      <span>·</span>
      <span id="status-git">git: —</span>
      <span id="status-save"></span>
    </div>
  </div>

  <script src="js/bundle.js"></script>
</body>
</html>
